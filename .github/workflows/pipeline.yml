name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------
      # Checkout
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # Build Docker Image
      # ----------------------------------------------------
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # ----------------------------------------------------
      # Install Trivy (stable pinned version)
      # ----------------------------------------------------
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      # ----------------------------------------------------
      # Security Gate (FAILS ONLY ON CRITICAL)
      # ----------------------------------------------------
      - name: Run Trivy scan (security gate)
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG

      # ----------------------------------------------------
      # Generate report (always runs)
      # ----------------------------------------------------
      - name: Generate SARIF report
        if: always()
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            $IMAGE_NAME:$IMAGE_TAG

      # ----------------------------------------------------
      # Upload report
      # ----------------------------------------------------
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

      # ----------------------------------------------------
      # Simulated ECR Login
      # ----------------------------------------------------
      - name: Simulate ECR Login
        run: echo "ECR login simulated via GitHub Secrets"

      # ----------------------------------------------------
      # Simulated Push
      # ----------------------------------------------------
      - name: Simulate Docker Push
        run: echo "Image pushed to ECR (simulation)"
