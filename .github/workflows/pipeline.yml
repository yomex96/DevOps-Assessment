name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    name: Build → Security Scan → Simulated Push
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image (IMPORTANT: load into Docker daemon)
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # Security scan (STRICT GATE)
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      # Upload report (only if scan runs)
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-results.sarif

      # Simulated ECR login
      - name: Simulate ECR Login
        run: echo "Simulating ECR login..."

      # Simulated push
      - name: Simulated Docker Push
        run: |
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
          echo "Push successful (simulated)"

      # Metadata
      - name: Output metadata
        run: |
          echo "Build completed"
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
