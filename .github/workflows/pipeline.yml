name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    name: Build → Security Scan → Simulated Push
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build Docker Image
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Security Scan (FAIL on CRITICAL only)
      - name: Security Scan with Trivy (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      # 5. Upload scan report (always runs)
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-results.sarif

      # 6. Simulated ECR Login
      - name: Simulate ECR Login
        run: |
          echo "🔐 Simulating login to Amazon ECR..."
          echo "Registry: $ECR_REGISTRY"
          echo "Login successful (simulated using GitHub Secrets)"

      # 7. Simulated Push
      - name: Simulate Docker Image Push
        run: |
          echo "🚀 Simulating Docker push to ECR..."
          echo "Image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Push successful (simulation complete)"

      # 8. Output image info
      - name: Image metadata
        run: |
          echo "✅ Build completed successfully"
          echo "Image tag: $IMAGE_TAG"
