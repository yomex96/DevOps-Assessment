name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

# Zero-trust: restrict the default GITHUB_TOKEN to the minimum required
permissions:
  contents: read          # checkout
  security-events: write  # upload SARIF to GitHub Security tab

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:

# =============================================================================
# 1. BUILD — compile the Docker image and persist it as an artifact so the
#    exact same binary is scanned and pushed (no silent rebuilds downstream)
# =============================================================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Save Docker image artifact
        run: docker save $IMAGE_NAME:$IMAGE_TAG -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1


# =============================================================================
# 2. SECURITY SCAN (SHIFT-LEFT) — hard gate on CRITICAL vulnerabilities.
#    The image is never pushed if a fixable CRITICAL CVE is detected.
#    Trivy is invoked directly (not via a wrapper action) so --exit-code and
#    --ignore-unfixed cannot be silently overridden.
# =============================================================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      # HARD SECURITY GATE — pipeline fails on any fixable CRITICAL CVE
      - name: Scan image (fail on CRITICAL)
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG

      # Always generate a SARIF report (even when the gate fails) for audit trail
      - name: Generate SARIF report
        if: always()
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            $IMAGE_NAME:$IMAGE_TAG

      # Upload to GitHub Security tab (requires security-events: write permission above)
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Upload SARIF artifact (additional backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif


# =============================================================================
# 3. PUSH (SIMULATED ECR) — runs only when the security gate passes.
#    Secrets are injected as env vars so they are masked in all log output.
#    Real deployment would replace the echo statements with OIDC-based
#    aws-actions/configure-aws-credentials and the aws ecr / docker CLI.
# =============================================================================
  push:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load image
        run: docker load -i image.tar

      # Secrets injected as env vars — values are masked in GitHub Actions logs
      - name: Simulate ECR login
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Simulating: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ECR_REGISTRY"
          echo "ECR login simulated — credentials masked above."

      - name: Simulate tag and push
        env:
          AWS_ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
          AWS_ECR_REPOSITORY: ${{ secrets.AWS_ECR_REPOSITORY }}
        run: |
          echo "Simulating: docker tag $IMAGE_NAME:$IMAGE_TAG $AWS_ECR_REGISTRY/$AWS_ECR_REPOSITORY:$IMAGE_TAG"
          echo "Simulating: docker push $AWS_ECR_REGISTRY/$AWS_ECR_REPOSITORY:$IMAGE_TAG"
          echo "Push simulation complete. Image: $IMAGE_NAME:$IMAGE_TAG → ECR (masked registry)"
