name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    name: Build → Security Scan → Simulated Push
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build Docker image (local only)
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Security scan with Trivy (FAIL on CRITICAL only)
      - name: Security Scan with Trivy (CRITICAL only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      # 5. Upload scan report (always runs)
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.sha }}
          path: trivy-results.sarif

      # 6. Simulated ECR login
      - name: Simulate ECR Login
        run: |
          echo "Simulating login to Amazon ECR..."
          echo "Login successful (simulated)"

      # 7. Simulated push to ECR
      - name: Simulate Docker Image Push
        run: |
          echo "Simulating Docker push..."
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
          echo "Push successful (simulation complete)"

      # 8. Output metadata
      - name: Image metadata
        run: |
          echo "Build completed successfully"
          echo "Image: $IMAGE_NAME"
          echo "Tag: $IMAGE_TAG"
