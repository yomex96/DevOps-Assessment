name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:

# =========================================================
# 1. BUILD JOB
# =========================================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .


# =========================================================
# 2. SECURITY SCAN JOB
# =========================================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 CRITICAL FIX: rebuild image in this job
      - name: Build Docker image (required for Trivy)
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Run Trivy scan (CRITICAL gate)
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG

      - name: Generate SARIF report
        if: always()
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            $IMAGE_NAME:$IMAGE_TAG

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif


# =========================================================
# 3. PUSH JOB (SIMULATED ECR)
# =========================================================
  push:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate ECR login
        run: |
          echo "Logging into ECR (simulated)"
          echo "AWS_ACCESS_KEY_ID=***"
          echo "AWS_SECRET_ACCESS_KEY=***"

      - name: Tag image for ECR
        run: |
          echo "docker tag $IMAGE_NAME:$IMAGE_TAG <aws_account_id>.dkr.ecr.region.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG"

      - name: Simulate Docker push
        run: echo "docker push to ECR completed (simulated)"
