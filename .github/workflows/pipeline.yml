name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:

# =========================================================
# 1. BUILD JOB
# =========================================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # Save image as artifact (CRITICAL FIX)
      - name: Save Docker image
        run: docker save $IMAGE_NAME:$IMAGE_TAG -o image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar


# =========================================================
# 2. SECURITY SCAN JOB
# =========================================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download and load SAME image (CRITICAL FIX)
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Verify image exists
        run: docker image ls

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version

      # SECURITY GATE
      - name: Run Trivy scan (CRITICAL gate)
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG

      # Always generate report (audit trail)
      - name: Generate SARIF report
        if: always()
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            $IMAGE_NAME:$IMAGE_TAG

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif


# =========================================================
# 3. PUSH JOB (SIMULATED ECR)
# =========================================================
  push:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download and load SAME image again
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      # Proper secret usage (CRITICAL FIX)
      - name: Simulate ECR login (with masked secrets)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Logging into ECR (simulated)"
          echo "Credentials are securely injected via GitHub Secrets"

      - name: Tag image for ECR
        run: |
          echo "docker tag $IMAGE_NAME:$IMAGE_TAG <aws_account_id>.dkr.ecr.region.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG"

      - name: Simulate Docker push
        run: |
          echo "docker push to ECR completed (simulated)"
