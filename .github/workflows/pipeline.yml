name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------
      # Checkout code
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------
      # Build Docker image (multi-stage Dockerfile)
      # ----------------------------------------------------
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # ----------------------------------------------------
      # Install Trivy (correct + reliable method)
      # ----------------------------------------------------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/download/v0.55.0/trivy_0.55.0_Linux-64bit.tar.gz
          tar zxvf trivy_0.55.0_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/
          trivy --version

      # ----------------------------------------------------
      # SECURITY GATE (FAIL ON CRITICAL VULNERABILITIES)
      # ----------------------------------------------------
      - name: Run Trivy Security Scan (Gate)
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG

      # ----------------------------------------------------
      # Generate SARIF report (for audit)
      # ----------------------------------------------------
      - name: Generate Trivy SARIF Report
        if: always()
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            $IMAGE_NAME:$IMAGE_TAG

      # ----------------------------------------------------
      # Upload scan report
      # ----------------------------------------------------
      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

      # ----------------------------------------------------
      # Simulated ECR Login (no AWS required)
      # ----------------------------------------------------
      - name: Simulate ECR Login
        run: echo "ECR login simulated using GitHub Secrets"

      # ----------------------------------------------------
      # Simulated Docker Push
      # ----------------------------------------------------
      - name: Simulate Docker Push
        run: echo "Image pushed to ECR (simulation)"
