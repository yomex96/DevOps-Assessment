name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    name: Build → Security Scan → Simulated Push
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build Docker image (loaded locally for scanning)
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      # 4. Run Trivy security scan (STRICT GATE)
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"

      # 5. Upload scan report (always run for audit trail)
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report-${{ github.sha }}
          path: trivy-results.sarif

      # 6. Simulated ECR login (no real AWS used)
      - name: Simulate ECR Login
        run: |
          echo "Logging into Amazon ECR (simulated)..."
          echo "Using GitHub Secrets for credentials (mocked)"

      # 7. Simulated push to ECR
      - name: Simulated Docker Push to ECR
        run: |
          echo "Pushing image to ECR (simulated)..."
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
          echo "Push successful (simulation only)"

      # 8. Pipeline summary
      - name: Pipeline Summary
        run: |
          echo "====================================="
          echo "E-PERMIT PIPELINE COMPLETED"
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
          echo "Security scan: PASSED (no CRITICAL vulns)"
          echo "Push: SIMULATED"
          echo "====================================="
