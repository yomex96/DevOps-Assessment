name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: "sarif"
          output: "trivy-results.sarif"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report-${{ github.sha }}
          path: trivy-results.sarif

  push:
    name: Simulated ECR Push
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Simulate ECR Login
        run: |
          echo "Simulating Amazon ECR login..."
          echo "Credentials loaded from GitHub Secrets (mocked)"

      - name: Simulated Docker Push to ECR
        run: |
          echo "Pushing image to ECR (SIMULATED)..."
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
          echo "Push successful (simulation only)"

      - name: Pipeline Summary
        run: |
          echo "====================================="
          echo "E-PERMIT PIPELINE COMPLETED"
          echo "Image: $IMAGE_NAME:$IMAGE_TAG"
          echo "Security scan: PASSED (no CRITICAL vulnerabilities detected)"
          echo "Push: SIMULATED"
          echo "====================================="
