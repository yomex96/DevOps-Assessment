name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # BUILD IMAGE
      # -----------------------------------------------------------------------
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # -----------------------------------------------------------------------
      # INSTALL TRIVY (PINNED VERSION - IMPORTANT FIX)
      # -----------------------------------------------------------------------
      - name: Install Trivy
        run: |
          TRIVY_VERSION=0.55.0
          wget https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
          tar zxvf trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/
          trivy --version

      # -----------------------------------------------------------------------
      # SECURITY SCAN (SINGLE RUN - FIXED)
      # -----------------------------------------------------------------------
      - name: Run Trivy security scan (CRITICAL gate + report)
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format sarif \
            --output trivy-results.sarif \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG

      # -----------------------------------------------------------------------
      # UPLOAD REPORT
      # -----------------------------------------------------------------------
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

      # -----------------------------------------------------------------------
      # SIMULATED ECR PUSH
      # -----------------------------------------------------------------------
      - name: Simulate ECR Login
        run: echo "Simulated ECR login using GitHub Secrets"

      - name: Simulate Docker Push
        run: echo "Image pushed to ECR (simulation)"
