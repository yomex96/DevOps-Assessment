name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build image (ensures availability for scan)
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      # Verify image exists
      - name: List Docker images
        run: docker images

      # SECURITY SCAN (STRICT ZERO-TRUST GATE)
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      # Upload report
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

      # Simulated ECR login
      - name: Simulate ECR Login
        run: echo "Simulated ECR login using GitHub Secrets"

      # Simulated push
      - name: Simulate Docker Push
        run: echo "Image pushed to ECR (simulation)"
