name: E-Permit CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: epermit-api
  IMAGE_TAG: ${{ github.sha }}

jobs:

# =========================================================
# 1. BUILD JOB
# =========================================================
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .


# =========================================================
# 2. SECURITY SCAN JOB
# =========================================================
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Scan image (CRITICAL gate)
        run: |
          trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            --no-progress \
            $IMAGE_NAME:$IMAGE_TAG


# =========================================================
# 3. PUSH JOB (SIMULATED ECR)
# =========================================================
  push:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Simulate ECR login
        run: |
          echo "Logging into ECR using GitHub Secrets (simulated)"
          echo "AWS_ACCESS_KEY_ID=***"
          echo "AWS_SECRET_ACCESS_KEY=***"

      - name: Tag image for ECR
        run: |
          echo "docker tag $IMAGE_NAME:$IMAGE_TAG <aws_account_id>.dkr.ecr.region.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG"

      - name: Simulate Docker push
        run: echo "docker push to ECR completed (simulated)"
