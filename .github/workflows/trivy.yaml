# Trivy configuration file
# Enforces ignore-unfixed at the scanner level, not just the action wrapper.
# This ensures CVEs with no available fix are excluded from the gate.

vulnerability:
  # Only fail on CVEs that have an available fix.
  # CVEs with no fix available are noise — they cannot be remediated.
  ignore-unfixed: true
  type:
    - os
    - library

severity:
  - CRITICAL
